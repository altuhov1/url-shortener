services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${STANDART_PG_USER}
      POSTGRES_PASSWORD: ${STANDART_PG_PASSWORD}
      POSTGRES_DB: ${STANDART_PG_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile.golang
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - internal
      - public

networks:
  internal:
    internal: true
  public:

volumes:
  postgres_data:
